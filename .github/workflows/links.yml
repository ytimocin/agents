name: links

on:
  pull_request:
  schedule:
    - cron: "0 14 * * 1"  # Mondays 14:00 UTC
  workflow_dispatch:

jobs:
  link-check:
    name: check all markdown links resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # The three generated tool-facing files contain the same links as
          # knowledge.md, but lychee dedupes URLs internally so the duplicate
          # parsing is cheap and the request count doesn't change.
          args: >-
            --verbose --no-progress
            --accept 200,204,206,403,429
            './**/*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
