name: doc-msdate

# learn.microsoft.com pages publish an `ms.date` (last significant content
# update). This job compares each Microsoft Learn URL's ms.date to the owning
# knowledge.md's `Last audited:` date and flags any page updated since — a
# low-noise, Microsoft-specific freshness signal that complements the generic
# content hash in doc-drift.yml. It nudges (warnings + job summary); it does not
# fail the build unless you set fail_on_drift.

on:
  schedule:
    - cron: "0 16 * * 1"  # Mondays 16:00 UTC
  workflow_dispatch:
    inputs:
      fail_on_drift:
        description: "Exit non-zero if any page's ms.date is newer than Last audited"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  msdate:
    name: ms.date newer than Last audited
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build URL → last-audited map (Microsoft Learn only)
        run: |
          set -euo pipefail
          : > map.tsv
          for k in $(find . -name knowledge.md -not -path './.git/*'); do
            d=$(grep -m1 '^Last audited:' "$k" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -1 || true)
            [[ -z "$d" ]] && continue
            grep -hoE "https://learn\.microsoft\.com[^[:space:]\"'<>)]+" "$k" \
              | sed -E 's/[#?].*$//; s/[.,;:]+$//' | sort -u \
              | while read -r u; do printf '%s\t%s\t%s\n' "$u" "$d" "$k"; done >> map.tsv
          done
          sort -u -o map.tsv map.tsv
          echo "Checking $(wc -l < map.tsv) Microsoft Learn URLs."

      - name: Compare ms.date to Last audited
        run: python3 scripts/doc_check.py msdate < map.tsv > drift.tsv 2> msdate.log || true

      - name: Summarize
        run: |
          set -euo pipefail
          if [[ -s drift.tsv ]]; then
            {
              echo "## 📅 Microsoft Learn pages updated since their topic was audited"
              echo
              echo "| knowledge.md | page (ms.date) | last audited |"
              echo "|---|---|---|"
            } >> "$GITHUB_STEP_SUMMARY"
            while IFS=$'\t' read -r path url ms aud; do
              [[ -z "${path:-}" ]] && continue
              echo "::warning file=$path::upstream ms.date $ms is newer than Last audited $aud — $url"
              echo "| \`$path\` | [$ms]($url) | $aud |" >> "$GITHUB_STEP_SUMMARY"
            done < drift.tsv
            if [[ "${{ github.event.inputs.fail_on_drift }}" == "true" ]]; then
              echo "::error::ms.date drift detected and fail_on_drift=true"
              exit 1
            fi
          else
            echo "All Microsoft Learn pages are at or older than their topic's last-audited date. ✅" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "--- fetch notes ---"; cat msdate.log || true
