name: verify

on:
  pull_request:
  push:
    branches: [main]

jobs:
  sync-check:
    name: topic files in sync with knowledge.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Regenerate topic files from knowledge.md
        run: bash scripts/sync.sh

      - name: Fail if any generated file drifted
        run: |
          if ! git diff --exit-code; then
            echo "::error::A topic's claude.md, codex.md, or copilot.md is out of sync with its knowledge.md."
            echo "Run 'bash scripts/sync.sh' locally and commit the regenerated files."
            exit 1
          fi
