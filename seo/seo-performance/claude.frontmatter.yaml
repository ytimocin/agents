r` instead of layout properties, the within-500ms-of-user-input expected-shift exemption). Covers the **lab-vs-field distinction** (lab = Lighthouse synthetic Moto-G4-on-slow-4G run for debugging + CI; field = CrUX or your own RUM for what Google actually ranks on — the verdict; only field measurement accurately captures the complete picture). Covers **CrUX** (the Chrome User Experience Report — 28-day rolling window, collected from Chrome users with usage-statistics opted in + synced history + no Sync passphrase, accessible via PageSpeed Insights / CrUX API / public BigQuery dataset / CrUX History API; URL-level + origin-level data with the no-URL-level-data-for-low-traffic-pages footgun → page-experience signal defaults to neutral). Covers **Lighthouse** (5 audit categories — Performance / Accessibility / Best Practices / SEO; PWA deprecated Dec 2024 and removed in Lighthouse 12+; Agentic Browsing added 2026+; perf score weights LCP 25% / TBT 30% / CLS 25% / SI 10% / FCP 10% — note **INP not in the lab score** because it requires real interactions, TBT is the lab proxy). Covers **PageSpeed Insights** (unified mobile + desktop dashboard combining CrUX field data + Lighthouse lab + ranked opportunities; the "Core Web Vitals Assessment Passed/Failed" badge is the SEO-relevant verdict from field data). Covers **Search Console's Core Web Vitals report** (URL groups grouped by Google; the "Validate fix" flow with multi-day re-evaluation; 28-day data lag). Covers measuring yourself with the **`web-vitals` JS library** (~2KB, `onLCP` / `onINP` / `onCLS` / `onFCP` / `onTTFB`; the attribution build for element selectors / interaction targets / shift sources — faster feedback than CrUX, all browsers not just Chrome, per-segment slicing). Covers the **non-CWV page-experience signals** (HTTPS required; mobile usability — viewport meta, ≥48px tap targets, ≥16px body text, never `user-scalable=no`; intrusive-interstitials demotion for modals blocking main content right after navigation; ad-density signal for excessive ads interfering with main content). Covers the **third-party-script playbook** for the new INP battleground (defer/async, conditional load on requestIdleCallback or first scroll, self-host critical third-party scripts, Partytown to run them in a Web Worker off the main thread, audit-and-remove). Covers the **end-to-end optimization workflow** (identify metric → identify URLs → reproduce in lab → diagnose with attribution → apply per-metric fix → verify lab → deploy → monitor RUM 1-2 days → wait 14-28 days for CrUX → Validate fix in Search Console). Page experience is a **ranking factor, not just a tiebreaker** per Google — but **relevance dominates**, so this is a multiplier on content quality, not a substitute. Content quality / E-E-A-T / titles / 18 spam policies / link best practices belong to seo-core-specialist; crawling / indexing / robots.txt / sitemaps / canonical / hreflang / redirects / JS SEO / Search Console diagnostics belong to seo-technical-specialist; Schema.org / JSON-LD / the 26+ Google rich-result types / Open Graph / Twitter Cards belong to seo-structured-data-specialist.
